<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC TAC TOE</title>
    <link rel="stylesheet" href="../public/css/styles.css">
    <link rel="shortcut icon" href="../Assets/logo pagina.png" type="image/x-icon">
</head>
<body>
    <div class="auth-actions">
        <a class="auth-link-button" id="loginLink" href="../public/login.html">Iniciar sesion</a>
        <span class="auth-user" id="userInfo" hidden></span>
        <button class="auth-link-button logout-button" id="logoutBtn" type="button" hidden>Cerrar sesion</button>
    </div>

    
    <div id="Juego">
        <h1>TIC TAC TOE</h1>
        <div class="match-toolbar">
            <button class="juego match-toolbar-btn" type="button">Crear partida</button>
            <input class="match-toolbar-code" type="text">
            <button class="juego match-toolbar-btn" type="button">Unirse</button>
        </div>
        <div id="Celdas">
            <div cellIndex="0" class="celda"></div>
            <div cellIndex="1" class="celda"></div>
            <div cellIndex="2" class="celda"></div>
            <div cellIndex="3" class="celda"></div>
            <div cellIndex="4" class="celda"></div>
            <div cellIndex="5" class="celda"></div>
            <div cellIndex="6" class="celda"></div>
            <div cellIndex="7" class="celda"></div>
            <div cellIndex="8" class="celda"></div>
        </div>
        <h2 id="statusText"></h2>
     
        <button class="juego" id="restartBtn">RESTART</button>
       
    </div>

    <script src="../public/js/app-paths.js"></script>
    <script src="../public/js/index-auth.js"></script>
    <script src="../ScriptJuego/game.js"></script>
</body>
</html>
