<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="shortcut icon" href="../Assets/logo pagina.png" type="image/x-icon">
</head>
<body>
    <div class="container auth-card">
        <h2>Crear cuenta</h2>
        <form id="registerForm" class="auth-form">
            <label class="auth-field" for="username">
                <span>Nombre de usuario</span>
                <input type="text" id="username" placeholder="Elige tu usuario" required>
            </label>
            <label class="auth-field" for="password">
                <span>Contraseña</span>
                <input type="password" id="password" placeholder="Crea tu contraseña" required>
            </label>
            <button id="formulario" type="submit" aria-label="Crear cuenta">→</button>
        </form>
        <p id="message"></p>
        <p class="auth-link">¿Ya tienes cuenta?</p>
        <p class="auth-link auth-link-strong"><a href="./login.html">Inicia sesión</a></p>
    </div>

    <script src="./js/app-paths.js"></script>
    <script src="./js/register.js"></script>
</body>
</html>
