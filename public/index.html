<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC TAC TOE</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="shortcut icon" href="../Assets/logo pagina.png" type="image/x-icon">
</head>
<body>
    <div class="auth-actions">
        <a class="auth-link-button" id="loginLink" href="./login.html">Iniciar sesion</a>
        <span class="auth-user" id="userInfo" hidden></span>
        <button class="auth-link-button logout-button" id="logoutBtn" type="button" hidden>Cerrar sesion</button>
    </div>

    <main class="game-layout">
        <div id="Juego">
            <h1>TIC TAC TOE</h1>
            <div class="match-toolbar">
                <button class="juego match-toolbar-btn" id="createGameBtn" type="button">Crear partida</button>
                <input class="match-toolbar-code" id="joinGameInput" type="text" placeholder="ID partida">
                <button class="juego match-toolbar-btn" id="joinGameBtn" type="button">Unirse</button>
            </div>
            <p id="matchInfo"></p>
            <div id="Celdas">
                <div cellIndex="0" class="celda"></div>
                <div cellIndex="1" class="celda"></div>
                <div cellIndex="2" class="celda"></div>
                <div cellIndex="3" class="celda"></div>
                <div cellIndex="4" class="celda"></div>
                <div cellIndex="5" class="celda"></div>
                <div cellIndex="6" class="celda"></div>
                <div cellIndex="7" class="celda"></div>
                <div cellIndex="8" class="celda"></div>
            </div>
            <h2 id="statusText"></h2>
            <div class="match-actions">
                <button class="juego" id="leaveGameBtn" type="button" hidden>SALIR</button>
            </div>
        </div>

        <aside class="chat-panel">
            <div class="chat-box">
                <div class="chat-messages"></div>
                <div class="chat-input-area">
                    <input class="chat-input" type="text" placeholder="Mensaje" aria-label="Mensaje del chat">
                </div>
            </div>
        </aside>
    </main>

    <script src="./js/app-paths.js"></script>
    <script src="./js/index-auth.js"></script>
    <script src="../ScriptJuego/game.js"></script>
</body>
</html>
